name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: node packages/cli/dist/index.js scan --fixture demo --format markdown
      - run: npm pack -w @looperswag/skill-doctor --dry-run
